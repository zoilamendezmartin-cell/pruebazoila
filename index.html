<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>

  <body>
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false"
    >

      <!-- ASSETS -->
      <a-assets>
        <!-- 🐆 PANTERA OSCURA -->
        <a-asset-item 
          id="pantherModel" 
          src="https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models@master/2.0/Animal/Panther/glTF-Binary/Panther.glb">
        </a-asset-item>
      </a-assets>

      <!-- CÁMARA -->
      <a-camera position="0 0 0"></a-camera>

      <!-- LUCES (muy importante para ambiente oscuro) -->
      <a-light type="ambient" intensity="0.3"></a-light>
      <a-light type="spot" position="0 1 1" intensity="2" angle="25"></a-light>

      <!-- TARGET -->
      <a-entity mindar-image-target="targetIndex: 0">

        <!-- 🐆 MODELO -->
        <a-gltf-model 
          src="#pantherModel"
          position="0 -0.3 0.2"
          scale="0.4 0.4 0.4"
          rotation="0 180 0"
          animation-mixer>
        </a-gltf-model>

      </a-entity>

    </a-scene>
  </body>
</html>
